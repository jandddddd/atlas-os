enabled: true
mode: dry-run
allowed_base_branches:
  - main
required_check_names:
  - "CI / verify"
blocking_review_priorities:
  - P1
  - P2
maximum_changed_files: 25
maximum_changed_lines: 1500
forbidden_paths:
  - ".github/workflows/"
  - ".env"
  - ".env.*"
  - "migrations/"
  - "prisma/"
required_label: "atlas-autopilot"
never_merge_labels:
  - "do-not-merge"
  - "security"
  - "product-decision"
auto_merge: false

repair:
  enabled: false
  execution_mode: manual
  maximum_attempts_per_commit: 1
  require_plan_artifact: true
  require_expected_head_sha: true
  allowed_block_reasons:
    - required_check_failed
    - blocking_review_found
  forbidden_paths:
    - ".github/workflows/"
    - ".github/atlas-autopilot.yml"
    - ".env"
    - ".env.*"
    - "migrations/"
    - "prisma/"
  maximum_changed_files: 10
  maximum_changed_lines: 500
  require_same_repository: true
  require_non_fork: true
  require_label: "atlas-repair"
  allowed_base_branches:
    - main
  never_run_labels:
    - "do-not-merge"
    - "security"
    - "product-decision"
  auto_merge: false
